<!DOCTYPE html>
<html lang="id">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <meta name="description" content="BIBUPlant - Platform cerdas berbasis kecerdasan buatan untuk mendeteksi penyakit bibit buah tropis" />
    <title>BIBUPlant - Gejala</title>
    <style>
        body {
            margin: 0;
            padding: 0; 
            min-height: 100vh;
            background-color: #f1f0e9;
        }
        body::-webkit-scrollbar {
            display: none;
            width: 0;
        }
        .halaman-dashboard {
            width: 100vw;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .halaman-dashboard .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 20px;
            position: relative;
        }

        .halaman-dashboard .logo-container {
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .halaman-dashboard .logo_bibup {
            width: 115px;
            height: 115px;
            flex-shrink: 0;
            position: relative;
            top: -4px;
            left: 10px;
        }

        .halaman-dashboard .brand-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding-top: 10px;
        }

        .halaman-dashboard .div {
            width: 188px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Dangrek-Bold";
            font-weight: 700;
            color: #000000;
            font-size: 25px;
            text-align: center;
            letter-spacing: 8.00px;
            line-height: 1px;
            margin: 0;
        }

        .halaman-dashboard .text-wrapper-2 {
            width: 280px;
            height: 1px;
            display: flex;
            align-items: center;
            justify-content: left;
            font-family: "Comic Sans";
            font-weight: 200;
            color: #000000;
            font-size: 18px;
            text-align: center;
            letter-spacing: 2.00px;
            line-height: 10px;
            margin: 0;
        }

        .halaman-dashboard .box1 {
            position: absolute;
            width: 280px;
            height: 80px;
            left: 50px;
            top: 150px;
            background: #41644a;
            border-radius: 20px;
            font-family: "Dangrek-Bold";
            font-size: 20px;
            color:#f1f0e9;
            padding-top: 15px;
            justify-content: center;
            display: flex;
        }

        .halaman-dashboard .box2 {
            position: absolute;
            width: 280px;
            height: 500px;
            left: 50px;
            top: 200px;
            background: #e9762b;
            border-radius: 10px;
        }
       
        .rectangle {
            position: absolute;
            width: 220px;
            height: 49px;
            left: 79px;
            background: #EBEAEA;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Dangrek-Bold';
            font-weight: 400;
            font-size: 14px;
            line-height: 16px;
            letter-spacing: 0.2em;
            color: #41644A;
            transition: font-weight 0.1s ease, transform 0.3s ease;
            outline: none;
            cursor: pointer;
            text-decoration: none;
        }

        .rectangle:hover{
            font-weight: 700;
            transform: scale(1.05);
        }

        .rectangle1 { top: 230px; }
        .rectangle2 { top: 305px; }
        .rectangle3 { top: 380px; }
        .rectangle4 { top: 455px; }
        .rectangle5 { top: 530px; }
        .rectangle6 { top: 605px; }

        .rectangle7 {
            position: absolute;
            width: 1000px;
            height: 550px;
            left: 500px;
            top: 150px;
            border-radius: 10px;
            background: #fff;
            padding: 20px;
            box-sizing: border-box;
        }

        .table-container {
            height: 420px;
            overflow-y: auto;
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            position: sticky;
            top: 0;
            background: #41644a;
            color: #f1f0e9;
            z-index: 2;
        }

        th, td {
            border: 1px solid #000000;
            padding: 8px;
            text-align: center;
        }

        th {
            background-color: #41644a;
        }

        .back-link {
            position: absolute;
            width: 138px;
            height: 29px;
            left: 1400px;
            top: 50px;
            font-weight: 400;
            font-size: 18px;
            display: flex;
            align-items: center;
            text-align: center;
            letter-spacing: 0.2em;
            color: #000000;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .add-data {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .add-data input {
            width: 300px;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

</style>
</head>
<body>
    <main class="halaman-dashboard">
        <header class="header">
            <div class="logo-container">
                <img class="logo_bibup" src="../static/gambar/logo_bibup.png" alt="Logo BIBUPlant" />
                <div class="brand-info">
                    <h1 class="div">BIBUPlant</h1>
                    <p class="text-wrapper-2">Bibit Sehat, Panen Nikmat!</p>
                </div>
            </div>
            <a href="/dashboard" class="back-link">Kembali</a>
        </header>

        <div class="box1">Welcome Back Mimin!</div>
        <div class="box2"></div>

        <a class="rectangle rectangle1" href="/riwayatpengguna">Riwayat Pengguna</a>
        <a class="rectangle rectangle2" href="/basispengetahuan">Basis Pengetahuan</a>
        <a class="rectangle rectangle3" href="/datapenyakit">Data Penyakit</a>
        <a class="rectangle rectangle4" href="/datagejala">Data Gejala</a>
        <a class="rectangle rectangle5" href="/datapengobatan">Data Pengobatan</a>
        <a class="rectangle rectangle6" href="/datapencegahan">Data Pencegahan</a>
    </main>

    <div class="rectangle7">

        <div class="add-data">
            <h2>Data Gejala</h2>
            <a href="/tambah_gejala">
                <button style="padding:8px 15px; border-radius:6px; background:#41644a; color:white; border:none; cursor:pointer;">
                    + Tambah Gejala
                </button>
            </a>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Kode</th>
                        <th>Jenis Gejala</th>
                        <th>Bobot Gejala</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="gejalaTable"></tbody>
            </table>
        </div>

    </div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const tbody = document.getElementById("gejalaTable");

    function loadTable() {
        fetch("/get_symptom")
            .then(res => res.json())
            .then(data => {
                tbody.innerHTML = "";

                data.forEach((item) => {
                    console.log(item);
                    tbody.innerHTML += `
                        <tr>
                            <td>${item.kode}</td>
                            <td>${item.name}</td>
                            <td>${item.bobot}</td>
                            <td>
                                <a href="/edit_gejala/${item.kode}">
                                    <button style="padding:5px 10px; border:none; background:#e9762b; color:white; border-radius:4px; cursor:pointer;">
                                        Edit
                                    </button>
                                </a>
                                <button onclick="hapusGejala('${item.kode}')"
                                    style="padding:5px 10px; border:none; background:#c0392b; color:white; border-radius:4px; cursor:pointer;">
                                    Hapus
                                </button>
                            </td>
                        </tr>
                    `;
                });
            })
            .catch(err => {
                console.error("Error load table:", err);
                alert("Gagal memuat data gejala");
            });
    }

    window.hapusGejala = function(id) {
        if (!confirm("Yakin hapus gejala ini?")) return;

        fetch(`/delete_symptom/${id}`, { method: "DELETE" })
            .then(res => res.json())
            .then(() => loadTable())
            .catch(err => {
                alert("Gagal menghapus data");
            });
    }

    loadTable();
});
</script>
</body>
</html>
