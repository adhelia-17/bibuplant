<body>
    <main class="halaman-diagnosa">
        <header class="header">
            <div class="logo-container">
                <img class="logo_bibup" src="../static/gambar/logo_bibup.png" alt="Logo BIBUPlant" />
                <div class="brand-info">
                    <h1 class="div">BIBUPlant</h1>
                    <p class="text-wrapper-2">Bibit Sehat, Panen Nikmat!</p>
                </div>
            </div>
            <a href="/dashboard" class="back-link">Kembali</a>
        </header>
        <nav class="navigation" aria-label="Main navigation">
            <div class="rectangle" role="presentation"></div>
            <ul class="nav-list">
                <li><a id="dashboard-link" href="/dashboard" class="text-wrapper-3" aria-current="page">Dashboard</a></li>
                <li><a id="diagnosa-link" href="/diagnosa" class="text-wrapper-4">Diagnosa</a></li>
                <li><a id="riwayat-link" href="/riwayat" class="text-wrapper-5">Riwayat</a></li>
                <li><a id="auth-link" href="/login" class="text-wrapper-6">Login</a></li>
            </ul>
        </nav>
        
      <div class="rectangle-content">

    <div class="choose-data">
        <h2 style="color:#000;">
            Pilih Gejala Penyakit Tanaman Anda!
        </h2>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>No</th>
                    <th>Kode</th>
                    <th>Jenis Gejala</th>
                    <th>Pilih</th>
                </tr>
            </thead>
            <tbody id="gejalaTable"></tbody>
        </table>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const tbody = document.getElementById("gejalaTable");

    function loadGejala() {
        fetch("/get_symptom")
            .then(res => res.json())
            .then(data => {
                tbody.innerHTML = "";

                data.forEach((item, index) => {
                    const row = document.createElement("tr");
                    row.innerHTML = `
                        <td>${index + 1}</td>
                        <td>${item.kode}</td>
                        <td>${item.name}</td>
                        <td>
                            <input 
                                type="checkbox" 
                                class="gejala-checkbox"
                                value="${item.kode}"
                            >
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            })
            .catch(err => {
                console.error(err);
                alert("Gagal memuat data gejala");
            });
    }

    loadGejala();

});
</script>
    <button id="diagnosaBtn" class="diagnosa-button">DIAGNOSA</button>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            const authLink = document.getElementById('auth-link');

            if (isLoggedIn) {
                authLink.textContent = 'Logout';
                authLink.href = '#'; 

                authLink.onclick = function() {
                    logout(); 
                    return false; 
                };
            } else {
                authLink.textContent = 'Login'; 
                authLink.href = '/login'; 
            }

            function logout() {
                localStorage.removeItem('isLoggedIn');
                window.location.href = '/dashboard';
            }
        });
    </script>
    <script>
    document.getElementById('diagnosaBtn').addEventListener('click', function (e) {
    e.preventDefault();

    const checkboxes = document.querySelectorAll('.gejala-checkbox');
    const gejalaUser = Array.from(checkboxes)
        .filter(cb => cb.checked)
        .map(cb => cb.value);

    if (gejalaUser.length === 0) {
        alert("Pilih minimal 1 gejala");
        return;
    }

    fetch("/diagnosa2", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ gejala: gejalaUser })
    })
    .then(res => res.json())
    .then(data => {
        localStorage.setItem("hasilDiagnosa", JSON.stringify(data));
        window.location.href = "/hasil-diagnosa";
    })
    .catch(err => {
        console.error(err);
        alert("Gagal melakukan diagnosa");
    });
});
</script>
</body>
</html>
