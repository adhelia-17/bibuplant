        .halaman-diagnosa .rectangle {

        }

        .halaman-diagnosa .nav-list {
            list-style: none;

            padding: 0;

        .halaman-diagnosa .nav-list li {

        .halaman-diagnosa .nav-list a {

            text-align: center;
            letter-spacing: 4.00px;
            line-height: 16px;
            text-decoration: none;

            margin: 0 30px;
            outline: none;
        }

        .halaman-diagnosa .nav-list a:hover,
        .halaman-diagnosa .nav-list a:focus {

        .halaman-diagnosa .text-wrapper-4,

        .tabel-hasil table {

          background-color: rgba(65, 100, 74, 0.1);

        .back-link,
        .pencegahan-isi {

        }

            align-items: center;
            text-align: center;

            color: #000000;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }

</head>
<body>
    <main class="halaman-diagnosa">
        <header class="header">
            <div class="logo-container">
                <img class="logo_bibup" src="../static/gambar/logo_bibup.png" alt="Logo BIBUPlant" />
                <div class="brand-info">
                    <h1 class="div">BIBUPlant</h1>
                    <p class="text-wrapper-2">Bibit Sehat, Panen Nikmat!</p>
                </div>
            </div>
            <a href="/dashboard" class="back-link">Kembali</a>
        </header>
        <nav class="navigation" aria-label="Main navigation">
            <div class="rectangle" role="presentation"></div>
            <ul class="nav-list">
                <li><a id="dashboard-link" href="/dashboard" class="text-wrapper-3" aria-current="page">Dashboard</a></li>
                <li><a id="diagnosa-link" href="/diagnosa" class="text-wrapper-4">Diagnosa</a></li>
                <li><a href="#riwayat" class="text-wrapper-5">Riwayat</a></li>
                <li><a id="auth-link" href="/login" class="text-wrapper-6">Login</a></li>
            </ul>
        </nav>
        <div class="rectangle-content"></div>
        <div class="rectangle-1"></div>
        <div class="rectangle-2"></div>
        <div class="riwayat"></div>
        <a id="riwayat-link" href="/riwayat" class="riwayat2">Riwayat</a>
        <div class="hasil-diagnosa">Hasil Diagnosa Tanaman Kamu</div>
        <div class="box-penanganan"></div>
        <div class="penanganan-pencegahan"></div>
        <div class="box-deskripsi"></div>
        <div class="deskripsi-penyakit"></div>
        <div class="box-hasil"></div>
    <script>
    document.addEventListener('DOMContentLoaded', function () {

    const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
    const authLink = document.getElementById('auth-link');

    if (isLoggedIn) {
        authLink.textContent = 'Logout';
        authLink.href = '#';
        authLink.onclick = function () {
        fetch('/logout').then(() => {
            localStorage.clear();
            window.location.href = '/dashboard';
        });
        return false;
    };
    } else {
        authLink.textContent = 'Login';
        authLink.href = '/login';
    }

    const hasilList = JSON.parse(localStorage.getItem('hasilDiagnosa'));

    if (!Array.isArray(hasilList) || hasilList.length === 0) {
        alert("Silakan lakukan diagnosa terlebih dahulu");
        window.location.href = "/diagnosa";
        return;
    }

    const hasilUtama = hasilList[0];

        let tabelHTML = `
    <table>
        <tr>
            <th>Penyakit</th>
            <th>Persentase</th>
        </tr>
    `;

    hasilList.forEach((item, index) => {
        const bold = index === 0 ? 'style="font-weight:bold;"' : '';
        tabelHTML += `
            <tr ${bold}>
                <td>${item.nama}</td>
                <td>${item.persentase}%</td>
            </tr>
        `;
    });

    tabelHTML += `</table>`;

    document.querySelector(".box-hasil").innerHTML = `
        <div class="tabel-hasil">${tabelHTML}</div>
    `;


    document.querySelector(".box-deskripsi").innerHTML = `
        <div class="deskripsi-isi">${hasilUtama.deskripsi ?? '-'}</div>
    `;

    document.querySelector(".box-penanganan").innerHTML = `
        <div class="pencegahan-isi">
            <b>Pengobatan:</b><br>${hasilUtama.pengobatan ? hasilUtama.pengobatan : '-'}
            <br><br>
            <b>Pencegahan:</b><br>${hasilUtama.pencegahan ? hasilUtama.pencegahan : '-'}
        </div>
    `;
});
</script>
</body>
</html>
