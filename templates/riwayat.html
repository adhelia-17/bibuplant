            letter-spacing: 0.2em;
            color: #000;
        }

        .menu-riwayat {
            position: absolute;
            width: 166px;
            height: 29px;
            left: 727px;
            top: 186px;
            font-family: 'David Libre', sans-serif;

            font-size: 20px;

        }

        .menu-logout {
            position: absolute;

            position: absolute;

            font-weight: 400;
            font-size: 18px;
            display: flex;
            align-items: center;
            text-align: center;

</head>

<body>
    <main class="halaman-diagnosa">
        <header class="header">
            <div class="logo-container">
                <img class="logo_bibup" src="../static/gambar/logo_bibup.png" alt="Logo BIBUPlant" />
                <div class="brand-info">
                    <h1 class="div">BIBUPlant</h1>
                    <p class="text-wrapper-2">Bibit Sehat, Panen Nikmat!</p>
                </div>
            </div>
            <a href="/dashboard" class="back-link">Kembali</a>
        </header>
        <nav class="navigation" aria-label="Main navigation">
            <div class="rectangle" role="presentation"></div>
            <ul class="nav-list">
                <li><a id="dashboard-link" href="/dashboard" class="text-wrapper-3" aria-current="page">Dashboard</a></li>
                <li><a id="diagnosa-link" href="/diagnosa" class="text-wrapper-4">Diagnosa</a></li>
                <li><a href="#riwayat" class="text-wrapper-5">Riwayat</a></li>
                <li><a id="auth-link" href="/login" class="text-wrapper-6">Login</a></li>
            </ul>
        </nav>
        <div class="rectangle-content">
            <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>No</th>
                        <th>User_Id</th>
                        <th>Username</th>
                        <th>Tanggal</th>
                        <th>Gejala</th>
                        <th>Kode_Penyakit</th>
                        <th>Similarity</th>
                    </tr>
                </thead>
                <tbody id="riwayatTable"></tbody>
            </table>
        </div>
    </div>
</div>
    
<script>
    document.addEventListener('DOMContentLoaded', function () {

    const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
    const authLink = document.getElementById('auth-link');

    if (isLoggedIn) {
        authLink.textContent = 'Logout';
        authLink.href = '#';
        authLink.onclick = function () {
        fetch('/logout').then(() => {
            localStorage.clear();
            window.location.href = '/dashboard';
        });
        return false;
    };
    } else {
        authLink.textContent = 'Login';
        authLink.href = '/login';
    } });

    document.addEventListener("DOMContentLoaded", () => {
        const tbody = document.getElementById("riwayatTable");

        fetch("/user/get-riwayat")
            .then(res => res.json())
            .then(data => {
                console.log(data);
                tbody.innerHTML = "";
                data.forEach((row, i) => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${i + 1}</td>
                            <td>${row.user_id}</td>
                            <td>${row.username}</td>
                            <td>${row.tanggal}</td>
                            <td>${row.gejala}</td>
                            <td>${row.kode_penyakit}</td>
                            <td>${row.similarity}%</td>
                        </tr>
                    `;
                });
            })
            .catch(err => {
                console.error(err);
                tbody.innerHTML = `<tr><td colspan="7">Gagal memuat data</td></tr>`;
            });
    });
    </script>
    </body>
    </html>
