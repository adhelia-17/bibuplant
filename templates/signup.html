        }

         .input-container {
            position: relative;
            margin-bottom: 75px;

            display: flex;
            align-items: center;
            justify-content: center;

            font-weight: 700;

            text-align: center;
            letter-spacing: 0.2em;
            text-decoration: none;
            font-family: "Dangrek-Bold";
        }

        .login-button {
            position: absolute;
            width: 120px;
            height: 40px;
            left: 560px;
            top: 610px;
            background: rgba(225, 179, 149, 0.32);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;

        .eye-icon {
        position: absolute;

<body>
    <main class="halaman-signup">
        <header class="header">
            <div class="logo-container">
                <img class="logo_bibup" src="../static/gambar/logo_bibup.png" alt="Logo BIBUPlant" />
                <div class="brand-info">
                    <h1 class="div">BIBUPlant</h1>
                    <p class="text-wrapper-2">Bibit Sehat, Panen Nikmat!</p>
                </div>
            </div>
        </header>   
    <div class="rectangle3"></div>
    <div class="rectangle2"></div>
    <a href="/dashboard" class="back-link">Kembali</a>
    <div class="signup">Daftar</div>
    <div class="name-label">Nama</div>
    <div class="email-label">Email</div>
    <div class="password-label">Kata Sandi</div>
    <div class="container">
    <div class="input-container">
            <input type="text" id="username" class="input-nama" onfocus="hideLabel('nama')" onblur="showLabel('nama')" />
            <div class="nama-teks">Masukkan Nama</div>
        </div>
    <div class="input-container">
            <input type="text" id="email" class="input-email" onfocus="hideLabel('email')" onblur="showLabel('email')" />
            <div class="email-teks">Masukkan Email</div>
        </div>
    <div class="input-container">
            <input type="password" id="password" class="input-password" onfocus="hideLabel('password')" onblur="showLabel('password')" />
            <div class="password-teks">Masukkan Kata Sandi</div>
            <span class="eye-icon" onclick="togglePassword(this)"><i class="fa fa-eye"></i></span>
        </div>
        </div>
        <button class="signup-button" onclick="signup()" style="top:610px">Daftar</button>
        <a href="/login" class="login-button" style="top:610px">Masuk</a>
    </div>
    
    <script>
    function signup() {
    const username = document.getElementById("username").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    if (!username || !email || !password) {
        alert("Semua field wajib diisi");
        return;
    }

    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
    alert("Format email tidak valid");
    return;
    }
 
    if (password.length < 8) {
        alert("Kata Sandi minimal 8 karakter");
        return;
    }

    fetch("/signup", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            username: username,
            email: email,
            password: password
        })
    })
    .then(res => res.json())
    .then(data => {
        if (data.error) {
            alert(data.error);
        } else {
            alert("Daftar berhasil, silakan Masuk");
            window.location.href = "/login";
        }
    })
    .catch(err => {
        console.error(err);
        alert("Server error");
    });
    }
    </script>

    <script>

        function hideLabel(type) {
            if (type === 'nama') document.querySelector('.nama-teks').style.opacity = '0'; 
            if (type === 'email') document.querySelector('.email-teks').style.opacity = '0'; 
            if (type === 'password') document.querySelector('.password-teks').style.opacity = '0';
        }

        function showLabel(type) {
            if (type === 'nama') {
                const inputNama = document.querySelector('.input-nama');
                if (inputNama.value === '') {
                    document.querySelector('.nama-teks').style.opacity = '1'; 
                }
            } else if (type === 'email') {
                const inputEmail = document.querySelector('.input-email');
                if (inputEmail.value === '') {
                    document.querySelector('.email-teks').style.opacity = '1'; 
                }
            }else if (type === 'password') {
                const inputPassword = document.querySelector('.input-password');
                if (inputPassword.value === '') {
                    document.querySelector('.password-teks').style.opacity = '1'; 
                }
            }
        }
    </script>

<script>
function togglePassword(el) {
    const input = document.getElementById("password");
    const icon = el.querySelector("i");

    if (input.type === "password") {
        input.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    } else {
        input.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
}
</script>

</body>
</html>
