    <style>

        .form-group label {

        }

        .btn-primary {

            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background: #2f4f35;
        }

        .btn-secondary {
            background: #e9762b;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-secondary:hover {
            background: #c85f1f;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #41644a;
            letter-spacing: 1px;
        }

        .custom-input {
            padding: 14px 18px;
            border-radius: 12px;
            border: 1.5px solid #ddd;
            background: #f9f9f9;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }

        .custom-input:hover {
            border-color: #e9762b;
            background: #fff;
        }

        .custom-input:focus {
            border-color: #41644a;
            background: #ffffff;
            box-shadow: 0 0 8px rgba(65, 100, 74, 0.3);
        }

        .custom-input::placeholder {
            color: #aaa;

        }

        .back-link {

            width: 138px;
            height: 29px;
            left: 1400px;

            font-weight: 400;

            display: flex;
            align-items: center;
            text-align: center;
            letter-spacing: 0.2em;

</style>
</head>
<body>
    <main class="halaman-dashboard">
        <header class="header">
            <div class="logo-container">
                <img class="logo_bibup" src="../static/gambar/logo_bibup.png" alt="Logo BIBUPlant" />
                <div class="brand-info">
                    <h1 class="div">BIBUPlant</h1>
                    <p class="text-wrapper-2">Bibit Sehat, Panen Nikmat!</p>
                </div>
            </div>
        <a href="/datapencegahan" class="back-link">Kembali</a>
        </header>
        <div class="box1">Welcome Back Mimin!</div>
        <div class="box2"></div>
        <a class="rectangle rectangle1" href="/riwayatpengguna">Riwayat Pengguna</a>
        <a class="rectangle rectangle2" href="/basispengetahuan">Basis Pengetahuan</a>
        <a class="rectangle rectangle3" href="/datapenyakit">Data Penyakit</a>
        <a class="rectangle rectangle4" href="/datagejala">Data Gejala</a>
        <a class="rectangle rectangle5" href="/datapengobatan">Data Pengobatan</a>
        <a class="rectangle rectangle6" href="/datapencegahan">Data Pencegahan</a>
    </main> 

<div class="form-card">
    <h2 class="form-title">Tambah Data Pencegahan</h2>

    <form id="tambahForm" class="form-content">

        <div class="form-group">
            <label>Kode Pencegahan</label>
            <input type="text" id="pencegahanKode" class="custom-input" placeholder="Contoh: PG01" required>
        </div>

        <div class="form-group">
            <label>Nama Pencegahan</label>
            <input type="text" id="pencegahanName" class="custom-input" placeholder="Contoh: Menyimpan media tanam di area terbuka" required>
        </div>

        <div class="form-buttons">
            <button type="submit" class="btn-primary">Simpan</button>
            <button type="button" class="btn-secondary" onclick="window.location.href='/datapencegahan'">
                Batal
            </button>
        </div>
    </form>
</div>
<script>
document.addEventListener("DOMContentLoaded", function () {

    const kodeInput = document.getElementById("pencegahanKode");
    const namaInput = document.getElementById("pencegahanName");
    const form = document.getElementById("tambahForm");

        form.addEventListener("submit", function(e){
        e.preventDefault();

        fetch("/add_prevention",{
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                kode: kodeInput.value,
                name: namaInput.value
            })
        })
        .then(res=>res.json())
        .then(data=>{
            alert(data.message);
            window.location.href = "/datapencegahan";
        })
        .catch(()=>{
            alert("Gagal menyimpan data");
        });
    });
});
</script>
</body>
</html>
